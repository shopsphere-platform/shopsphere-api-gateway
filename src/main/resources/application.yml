server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: inventory-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/inventory/**

        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: shopsphere-secret-key-must-be-at-least-256-bits-long-for-hmac-sha

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: false
    register-with-eureka: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

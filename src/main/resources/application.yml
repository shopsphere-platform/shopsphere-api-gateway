server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**

        - id: inventory-service
          uri: http://inventory-service:8085
          predicates:
            - Path=/api/inventory/**

        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: shopsphere-secret-key-must-be-at-least-256-bits-long-for-hmac-sha

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: false
    register-with-eureka: false

management:
  endpoints:
    web:
      exposure:
        include: health,info